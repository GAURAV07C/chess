services:
  - type: web
    name: backend
    env: node
    plan: free
    buildCommand: yarn install && cd apps/backend && yarn build
    startCommand: cd apps/backend && yarn start
    preDeployCommand: yarn workspace @repo/db prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: GOOGLE_CLIENT_SECRET
        value: ${GOOGLE_CLIENT_SECRET}
      - key: GITHUB_CLIENT_ID
        value: ${GITHUB_CLIENT_ID}
      - key: GITHUB_CLIENT_SECRET
        value: ${GITHUB_CLIENT_SECRET}
      - key: ALLOWED_HOSTS
        value: ${ALLOWED_HOSTS}
      - key: AUTH_REDIRECT_URL
        value: ${ALLOWED_HOSTS}/auth/callback
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true

  - type: web
    name: ws
    env: node
    plan: free
    buildCommand: yarn install && cd apps/ws && yarn build
    startCommand: cd apps/ws && yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        fromService:
          name: backend
          property: env.JWT_SECRET
      - key: COOKIE_SECRET
        fromService:
          name: backend
          property: env.COOKIE_SECRET
      - key: GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: GOOGLE_CLIENT_SECRET
        value: ${GOOGLE_CLIENT_SECRET}
      - key: ALLOWED_HOSTS
        value: ${ALLOWED_HOSTS}
      - key: AUTH_REDIRECT_URL
        value: ${ALLOWED_HOSTS}/game/random

  - type: static
    name: frontend
    buildCommand: yarn install && cd apps/frontend && yarn build
    staticPublishPath: apps/frontend/dist
    envVars:
      - key: VITE_APP_BACKEND_URL
        fromService:
          name: backend
          property: url
      - key: VITE_APP_WS_URL
        fromService:
          name: ws
          property: url
